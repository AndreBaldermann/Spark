services:
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: homelab
      POSTGRES_USER: homelab
      POSTGRES_PASSWORD: homelab
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelab -d homelab"]
      interval: 5s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.0.0
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  ollama:
    image: ollama/ollama:0.1.48
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  spark-demo:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app:/app/src
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      POSTGRES_DSN: postgresql://homelab:homelab@postgres:5432/homelab
    depends_on:
      redpanda:
        condition: service_started
      postgres:
        condition: service_healthy
    command: bash -lc "python src/homelab_agent.py --minutes 120 --output data/homelab/raw/events.jsonl && python src/homelab_streaming.py --input-dir data/homelab/raw --output-dir data/homelab/curated --once && python src/load_alerts_to_postgres.py --alerts-path data/homelab/curated/alerts"

volumes:
  ollama:
